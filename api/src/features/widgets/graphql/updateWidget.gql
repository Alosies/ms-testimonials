# Update an existing widget
mutation UpdateWidget($widgetId: String!, $set: widgets_set_input!) {
  update_widgets_by_pk(pk_columns: { id: $widgetId }, _set: $set) {
    id
    organization_id
    created_by
    name
    type
    theme
    show_ratings
    show_dates
    show_company
    show_avatar
    max_display
    settings
    form_id
    is_active
    created_at
    updated_at
    updated_by
  }
}
