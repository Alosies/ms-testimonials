# Create a new widget
mutation CreateWidget($object: widgets_insert_input!) {
  insert_widgets_one(object: $object) {
    id
    organization_id
    created_by
    name
    type
    theme
    show_ratings
    show_dates
    show_company
    show_avatar
    max_display
    settings
    form_id
    is_active
    created_at
    updated_at
  }
}
